name = "cloudflare-sites"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./public"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "blog-content"

[[d1_databases]]
binding = "DB"
database_name = "cloudflare-sites-db"
database_id = "13c1c212-306e-4ee1-9a28-6d89ce303555"

# KV Cache (shared with store service)
[[kv_namespaces]]
binding = "CACHE"
id = "091bec5ff7e945e180ccc68eaf83a088"

# Analytics Engine (uncomment after enabling at Dashboard)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "storefront_analytics"

[vars]
SITE_ID = "default"
