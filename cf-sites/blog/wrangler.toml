name = "cloudflare-sites"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./public"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "blog-content"

[[d1_databases]]
binding = "DB"
database_name = "cloudflare-sites-db"
database_id = "9e0d5b2d-d8f3-48fa-beda-bd70ed602e91"

# KV Cache (shared with store service)
[[kv_namespaces]]
binding = "CACHE"
id = "89c7aeae01f341afbb88fd50eb194477"

# Analytics Engine (uncomment after enabling at Dashboard)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "storefront_analytics"

[vars]
SITE_ID = "china-tech-mfg"
