name = "cloudflare-sites"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./public"

[[r2_buckets]]
binding = "CONTENT_BUCKET"
bucket_name = "blog-content"

[[d1_databases]]
binding = "DB"
database_name = "cloudflare-sites-db"
database_id = "883b9411-48b7-4c68-8991-2c82d7504e9d"

# KV Cache (shared with store service)
[[kv_namespaces]]
binding = "CACHE"
id = "3d29e2a1a55d4ecdb102d191cf281368"

# Analytics Engine (uncomment after enabling at Dashboard)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "storefront_analytics"

[vars]
SITE_ID = "m8.com.cn"
