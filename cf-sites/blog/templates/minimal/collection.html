<section>
  <h1 class="text-xl font-bold text-gray-900 mb-1">{{listTitle}}</h1>
  {{#if listDescription}}<p class="text-gray-500 text-sm mb-6">{{listDescription}}</p>{{/if}}
  <div class="divide-y divide-gray-100">
    {{#each posts}}
      {{> post-card}}
    {{/each}}
  </div>
  {{> pagination}}
</section>
