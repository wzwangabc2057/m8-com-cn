{{#if showHeader}}
<header class="max-w-2xl mx-auto px-4 pt-8 pb-4 border-b border-gray-200">
  <a href="/" class="no-underline flex items-center gap-2">
    {{#if site.header.logo}}
    <img src="{{site.header.logo}}" alt="{{site.name}}" class="h-6 w-auto">
    {{/if}}
    <span class="text-lg font-semibold text-gray-900">{{fallback site.header.logoText site.name}}</span>
  </a>
  {{#if (not (eq site.header.showNav false))}}
  <nav class="mt-2 flex gap-4 items-center" aria-label="主导航">
    {{#each site.nav}}
      <a href="{{this.href}}" class="text-sm text-gray-500 hover:text-gray-900 no-underline">{{this.label}}</a>
    {{/each}}
    {{#if storeEnabled}}
    <!-- Cart icon -->
    <a href="/store" class="cart-link ml-auto" aria-label="购物车" title="购物车" style="display:inline-flex;align-items:center;position:relative;color:#6b7280;transition:color .2s;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge" style="display:none;position:absolute;top:-6px;right:-8px;background:#4361ee;color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;text-align:center;line-height:16px;padding:0 3px;"></span>
    </a>
    {{/if}}
  </nav>
  {{/if}}
</header>
{{/if}}
