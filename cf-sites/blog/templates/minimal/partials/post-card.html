<article class="py-4">
  <h3 class="text-base font-medium">
    <a href="{{postUrl this.slug}}" class="text-gray-900 no-underline hover:text-blue-600">{{this.title}}</a>
  </h3>
  <div class="text-sm text-gray-400 mt-1">
    {{formatDate this.publishedAt}}
    {{#each this.categories}}
      &middot; <a href="{{categoryUrl this}}" class="text-gray-400 hover:text-gray-600 no-underline">{{#if ../categoryDisplayNames}}{{lookup ../categoryDisplayNames @index}}{{else}}{{this}}{{/if}}</a>
    {{/each}}
  </div>
  {{#if this.excerpt}}
    <p class="text-sm text-gray-600 mt-1 leading-relaxed">{{this.excerpt}}</p>
  {{/if}}
</article>
