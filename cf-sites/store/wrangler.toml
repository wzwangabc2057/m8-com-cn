name = "cloudflare-store"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# KV Cache (shared with blog service)
[[kv_namespaces]]
binding = "CACHE"
id = "091bec5ff7e945e180ccc68eaf83a088"

# Queue producer for async events
[[queues.producers]]
queue = "storefront-events"
binding = "EVENTS_QUEUE"

# Service binding to edge-services Worker (for DO access)
[[services]]
binding = "EDGE_SERVICES"
service = "cloudflare-edge-services"

# Analytics Engine (uncomment after enabling at Dashboard)
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "storefront_analytics"

[vars]
MEDUSA_BACKEND_URL = "https://backend-production-eff2.up.railway.app"
CMS_API_URL = "https://cloudflare-sites-cms.pages.dev"
TURNSTILE_SITE_KEY = "<turnstile-site-key>"
